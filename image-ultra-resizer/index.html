<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片快捷縮放工具 - Image Ultra Resizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#554dd7',
              secondary: '#e6dde8',
              muted: '#acaeb5',
              white: '#ffffff'
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      background-image: radial-gradient(at 0% 0%, #e6dde8 0, transparent 50%), radial-gradient(at 100% 0%, #ffffff 0, transparent 50%);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #e6dde8;
    }

    .custom-shadow {
      box-shadow: 0 4px 6px -1px rgba(85, 77, 215, 0.1), 0 2px 4px -1px rgba(85, 77, 215, 0.06);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <a href="../index.html" class="fixed bottom-6 right-6 z-50">
    <button
      class="bg-brand-primary text-white px-4 py-2 rounded-full shadow-lg hover:bg-opacity-90 transition-all flex items-center gap-2">
      <span>🏠</span> 回到首頁
    </button>
  </a>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
