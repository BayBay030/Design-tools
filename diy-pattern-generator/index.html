<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Editor 95 - Pink Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --win-grey: #f5f0f9;
      --win-white: #ffffff;
      --win-shadow: #b8a9c9;
      --win-shadow-dark: #8a7fb9;
      --win-black: #d4bbed;
      --win-accent: #edbbc9;
      --win-accent-light: #fbcfe8;
      --win-accent-dark: #db2777;
      --pastel-pink: #fdf2f8;
      --pastel-purple: #f5f0f9;
      --border-width: 2px;
    }

    body {
      background-color: var(--pastel-pink);
      background-image:
        radial-gradient(var(--win-accent-light) 1px, transparent 1px),
        linear-gradient(45deg, var(--pastel-pink) 25%, transparent 25%, transparent 75%, var(--pastel-pink) 75%, var(--pastel-pink)),
        linear-gradient(45deg, var(--pastel-pink) 25%, transparent 25%, transparent 75%, var(--pastel-pink) 75%, var(--pastel-pink));
      background-size: 20px 20px, 40px 40px, 40px 40px;
      background-position: 0 0, 0 0, 20px 20px;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      color: #4a3a5a;
    }

    .win95-window {
      background: var(--win-grey);
      border: var(--border-width) solid var(--win-black);
      box-shadow:
        inset 1px 1px 0px var(--win-white),
        inset -1px -1px 0px var(--win-shadow),
        3px 3px 0px rgba(212, 187, 237, 0.2);
      padding: 2px;
    }

    .win95-title {
      background: linear-gradient(90deg, var(--win-accent) 0%, #d8b4fe 100%);
      padding: 5px 10px;
      color: white;
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--win-black);
      text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.2);
    }

    .win95-button {
      background: var(--win-grey);
      border: var(--border-width) solid var(--win-black);
      box-shadow:
        inset 1.5px 1.5px 0px var(--win-white),
        inset -1.5px -1.5px 0px var(--win-shadow);
      padding: 4px 12px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4a3a5a;
      font-weight: 700;
      transition: all 0.1s;
    }

    .win95-button:active:not(:disabled) {
      box-shadow:
        inset -1.5px -1.5px 0px var(--win-white),
        inset 1.5px 1.5px 0px var(--win-shadow);
      transform: translate(1px, 1px);
    }

    .win95-inset {
      border: var(--border-width) solid var(--win-black);
      box-shadow:
        inset -1px -1px 0px var(--win-white),
        inset 1px 1px 0px var(--win-shadow);
      background: white;
    }

    .pixel-text {
      font-family: 'Pixelify Sans', sans-serif;
    }

    .win95-icon-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--win-grey);
      border: 1.5px solid var(--win-black);
      box-shadow: inset 1px 1px 0px #fff, inset -1px -1px 0px var(--win-shadow);
      padding: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 18px;
      width: 10px;
      background: var(--win-accent);
      border: 2px solid var(--win-black);
      box-shadow: inset 1px 1px 0px white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <a href="../index.html" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; text-decoration: none;">
    <button class="win95-button">
      <span>🏠</span> 回到首頁
    </button>
  </a>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
